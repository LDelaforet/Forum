<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/css/style.css">
    <link rel="stylesheet" href="./static/css/discussion.css">
    <script src="https://kit.fontawesome.com/e29182f907.js" crossorigin="anonymous"></script>
    <title>Mon Profil</title>
    <style>
        .profile-container {
            max-width: 800px;
            margin: 84px auto 20px auto; /* Adjust margin-top to clear fixed navbar */
            background-color: var(--primary-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-color-white);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            font-weight: bold;
            color: white;
            margin: 0 auto 15px auto;
            border: 3px solid var(--border-color);
        }
        .profile-username {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .profile-status {
            color: var(--text-color);
            font-size: 1.1em;
        }
        .profile-details {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-item:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: bold;
            color: var(--text-color);
        }
        .detail-value {
            color: var(--text-color-white);
        }
        .profile-actions {
            margin-top: 30px;
            text-align: center;
        }
        .edit-button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .edit-button:hover {
            background-color: var(--hover-color);
        }
    </style>
</head>
<body>
    <!-- NAVBAR EN HAUT -->
    <nav class="navbar">
        <div class="navbar-logo" onclick="window.location.href='./index.html'">LOGO</div>

        <div class="navbar-btns">
            <button class="navbar-btn" onclick="window.location.href='./log-in.html'"><i class="fa-regular fa-user"></i></button>
            <button class="navbar-btn" onclick="window.location.href='/notifications'"><i class="fa-regular fa-bell"></i></button>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">JD</div>
            <div class="profile-username">John Doe</div>
            <div class="profile-status">Membre Actif</div>
        </div>

        <div class="profile-details">
            <div class="detail-item">
                <span class="detail-label">Email:</span>
                <span class="detail-value">john.doe@example.com</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Date d'inscription:</span>
                <span class="detail-value">10 Janvier 2023</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Total Publications:</span>
                <span class="detail-value">125</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Total Réponses:</span>
                <span class="detail-value">340</span>
            </div>
        </div>

        <div class="profile-actions">
            <a href="#" class="edit-button">Modifier le Profil</a>
        </div>
    </div>
</body>
</html>
